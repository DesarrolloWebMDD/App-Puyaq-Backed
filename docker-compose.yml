services:
  postgres:
    image: postgres:17-alpine
    container_name: puyaq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: puyaq
      POSTGRES_USER: puyaq
      POSTGRES_PASSWORD: puyaq_dev
    ports:
      - "5432:5432"
    volumes:
      - puyaq_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U puyaq -d puyaq"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: puyaq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - puyaq_redis_data:/data

volumes:
  puyaq_postgres_data:
  puyaq_redis_data:
